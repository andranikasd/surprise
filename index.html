<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="💝 Անակնկալ">
  <meta property="og:description" content="Ի՞նչ կա ներսում... Բաց արա 🎁">
  <meta property="og:image" content="https://surprise.mxnq.net/ticket1.png">
  <meta property="og:url" content="https://surprise.mxnq.net">
  <meta property="og:type" content="website">
  <title>💝 Անակնկալ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="ticket1.png">
  <link rel="preload" as="image" href="ticket2.png">
  <style>
    :root {
      --pink:   #ff6eb4;
      --purple: #b24bff;
      --gold:   #ffd700;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Nunito', system-ui, sans-serif;
      background: linear-gradient(160deg, #0d0020 0%, #2a0654 100%);
      color: #fff;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── SCREENS ─────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 28px 22px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: opacity .55s ease, transform .55s ease;
    }
    .screen.out {
      opacity: 0;
      transform: scale(.92) translateY(24px);
      pointer-events: none;
    }

    /* ── SHARED ───────────────────────────────── */
    .content {
      position: relative; z-index: 1;
      text-align: center;
      margin: auto;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; border: none; cursor: pointer;
      font-family: inherit; font-weight: 800;
      font-size: clamp(1rem, 4.5vw, 1.2rem);
      padding: 15px 44px; border-radius: 50px;
      box-shadow: 0 8px 36px rgba(255,110,180,.6);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .4px;
      min-width: 180px;
    }
    .btn:active  { transform: scale(.95); box-shadow: 0 4px 16px rgba(255,110,180,.35); }
    .btn:disabled { opacity: .55; cursor: default; transform: none; }

    /* ── INTRO ────────────────────────────────── */
    #s-intro .content { max-width: 360px; }

    .gift-icon {
      display: block; font-size: clamp(4.5rem, 18vw, 6rem);
      line-height: 1; margin-bottom: 22px;
      animation: wiggle 2.2s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: translateY(0) rotate(-6deg); }
      50%      { transform: translateY(-20px) rotate(6deg); }
    }

    .intro-msg {
      font-size: clamp(1rem, 4.2vw, 1.15rem);
      line-height: 2; color: rgba(255,255,255,.88);
      margin-bottom: 34px;
    }
    .intro-msg .name  { color: var(--pink); font-weight: 800; font-size: 1.05em; }
    .intro-msg strong { color: var(--gold); }

    /* ── WHEEL SCREEN ─────────────────────────── */
    #s-wheel .content { width: 100%; max-width: 400px; }

    .wheel-title {
      font-size: clamp(1.35rem, 5.5vw, 1.9rem); font-weight: 900;
      background: linear-gradient(135deg, var(--pink), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .wheel-sub {
      font-size: clamp(.85rem, 3.5vw, .98rem);
      color: rgba(255,255,255,.6); margin-bottom: 20px;
    }

    .canvas-wrap {
      position: relative; display: inline-block; margin-bottom: 22px;
    }
    .pointer {
      position: absolute; top: -24px; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(2rem, 8vw, 2.6rem); line-height: 1;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.65));
      z-index: 5; pointer-events: none;
      color: #d4af37;
    }
    #wc {
      display: block; border-radius: 50%;
      box-shadow:
        0 0 0 4px rgba(212,175,55,.5),
        0 0 0 9px rgba(212,175,55,.18),
        0 16px 64px rgba(0,0,0,.9),
        0 8px 32px rgba(212,175,55,.25);
    }
    .hub {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 52px; height: 52px;
      background: radial-gradient(circle at 35% 30%, #ffe566, #c9a227, #7a5c10);
      border: 3px solid rgba(255,255,255,.85);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,.6), 0 0 12px rgba(212,175,55,.5);
      cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      transition: transform .15s;
    }
    .hub:active { transform: translate(-50%,-50%) scale(.92); }

    #spin-btn { animation: glow 2.4s ease-in-out infinite; }
    @keyframes glow {
      0%,100% { box-shadow: 0 8px 36px rgba(212,175,55,.5); }
      50%      { box-shadow: 0 8px 52px rgba(212,175,55,.9), 0 0 0 10px rgba(212,175,55,.12); }
    }
    #spin-btn:disabled { animation: none; }

    /* ── RESULT SCREEN ────────────────────────── */
    #s-result .content { max-width: 420px; width: 100%; }

    .trophy {
      display: block; font-size: clamp(4rem, 16vw, 5rem);
      margin-bottom: 12px;
      animation: popIn .65s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-160deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    .result-title {
      font-size: clamp(1.9rem, 8vw, 2.6rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold) 20%, var(--pink) 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .won-text {
      font-size: clamp(.9rem, 3.8vw, 1.05rem);
      color: rgba(255,255,255,.78); margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 28px; padding: 26px 22px;
      animation: fadeUp .7s .2s ease both;
    }
    .card-msg {
      font-size: clamp(.95rem, 3.8vw, 1.05rem);
      line-height: 1.85; color: rgba(255,255,255,.9);
      margin-bottom: 22px;
    }
    .card-msg strong { color: var(--pink); }

    .ticket-slider {
      position: relative;
      overflow: hidden;
      width: 100%;
      margin-top: 16px;
      border-radius: 14px;
    }
    .ticket-track {
      display: flex;
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }
    .ticket-slide {
      flex: 0 0 100%;
      min-width: 100%;
    }
    .ticket-img {
      display: block;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .slider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.3);
      cursor: pointer;
      transition: background .2s, transform .2s;
    }
    .slider-dot.active {
      background: var(--gold);
      transform: scale(1.35);
    }

    /* ── CONFETTI ─────────────────────────────── */
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
    }
  </style>
</head>
<body>

<!-- confetti layer -->
<canvas id="confetti"></canvas>

<!-- ══ SCREEN 1 — INTRO ════════════════════════════════ -->
<div class="screen" id="s-intro">
  <div class="content">
    <span class="gift-icon">🎁</span>
    <p class="intro-msg">
      <span class="name" id="her-name">Սիրելի Անի</span>,<br>
      ես <strong>հատուկ քեզ համար</strong><br>
      մի անակնկալ եմ պատրաստել <br><br>
      Պտտիր անիվը
    </p>
    <button class="btn" onclick="showWheel()">Բացել&nbsp;🎀</button>
  </div>
</div>

<!-- ══ SCREEN 2 — WHEEL ════════════════════════════════ -->
<div class="screen out" id="s-wheel">
  <div class="content">
    <p class="wheel-sub">Սեղմիր կենտրոնի վրա կամ կոճակը ↓</p>
    <div class="canvas-wrap">
      <div class="pointer">▼</div>
      <canvas id="wc"></canvas>
      <div class="hub" onclick="spin()">✨</div>
    </div>
    <button class="btn" id="spin-btn" onclick="spin()">ՊՏՏԵԼ&nbsp;✨</button>
  </div>
</div>

<!-- ══ SCREEN 3 — RESULT ═══════════════════════════════ -->
<div class="screen out" id="s-result">
  <div class="content">
    <h2 class="result-title">Շնորհավո՜ր!</h2>
    <div class="card">
      <p class="card-msg">
        <strong>թատրոնի 2 տոմս</strong> 🎭<br>
        Ընդունիր որպես դրական, ջերմ և բարյացակամ վերաբերմունքի ժեստ քո հանդեպ
      </p>
    </div>
    <div class="ticket-slider" id="ticket-slider">
      <div class="ticket-track" id="ticket-track">
        <div class="ticket-slide"><img class="ticket-img" src="ticket1.png" alt="Տոմս 1"></div>
        <div class="ticket-slide"><img class="ticket-img" src="ticket2.png" alt="Տոմս 2"></div>
      </div>
    </div>
    <div class="slider-dots">
      <div class="slider-dot active" onclick="goSlide(0)"></div>
      <div class="slider-dot"        onclick="goSlide(1)"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ✏️  CONFIG — fill these in before sharing the link
// ═══════════════════════════════════════════════════════
const CFG = {
  name: 'Սեդա',  // ← her name (Armenian)
};
// ═══════════════════════════════════════════════════════

// Casino wheel — [color, degrees]; index 9 = small black winner
const SC = (() => {
  const raw = [
    ['#d4af37', 52], ['#8b0000', 33], ['#b8952a', 44], ['#111111', 28],
    ['#d4af37', 55], ['#8b0000', 30], ['#b8952a', 46], ['#8b0000', 26],
    ['#d4af37', 34], ['#111111', 12],
  ];
  let a = 0;
  return raw.map(([c, deg]) => {
    const arc = deg / 360 * Math.PI * 2;
    const s = a; a += arc;
    return { c, s, e: s + arc, arc };
  });
})();
const WINNER_IDX = 9;

// ── bootstrap ────────────────────────────────────
document.getElementById('her-name').textContent = 'Սիրելի ' + CFG.name;

// ── screen transitions ────────────────────────────
let wheelReady = false;

function showWheel() {
  document.getElementById('s-intro').classList.add('out');
  document.getElementById('s-wheel').classList.remove('out');
  if (!wheelReady) { initWheel(); wheelReady = true; }
}

function showResult() {
  document.getElementById('s-wheel').classList.add('out');
  document.getElementById('s-result').classList.remove('out');
  startConfetti();
  try { navigator.vibrate && navigator.vibrate([80, 40, 80, 40, 260]); } catch (_) {}
}

// ── wheel ─────────────────────────────────────────
let cvs, ctx2d, angle = 0, busy = false;

function initWheel() {
  cvs = document.getElementById('wc');
  const sz = Math.min(window.innerWidth - 44, 320);
  cvs.width = cvs.height = sz;
  ctx2d = cvs.getContext('2d');
  drawWheel();
}

function drawWheel() {
  const cx = cvs.width / 2, r = cx - 4;
  ctx2d.clearRect(0, 0, cvs.width, cvs.height);

  // Colored segments
  for (const seg of SC) {
    ctx2d.beginPath();
    ctx2d.moveTo(cx, cx);
    ctx2d.arc(cx, cx, r, angle + seg.s, angle + seg.e);
    ctx2d.closePath();
    ctx2d.fillStyle = seg.c;
    ctx2d.fill();
  }

  // Gold dividers — single batched path, one stroke call
  ctx2d.strokeStyle = '#d4af37';
  ctx2d.lineWidth = 1.5;
  ctx2d.shadowColor = 'rgba(212,175,55,.7)';
  ctx2d.shadowBlur = 5;
  ctx2d.beginPath();
  for (const seg of SC) {
    const a = angle + seg.s, ca = Math.cos(a), sa = Math.sin(a);
    ctx2d.moveTo(cx + 28 * ca, cx + 28 * sa);
    ctx2d.lineTo(cx + r  * ca, cx + r  * sa);
  }
  ctx2d.stroke();

  // Gold outer rim
  ctx2d.shadowColor = 'rgba(255,215,0,.9)';
  ctx2d.shadowBlur = 12;
  ctx2d.lineWidth = 8;
  ctx2d.beginPath();
  ctx2d.arc(cx, cx, r, 0, Math.PI * 2);
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;

  // Peg dots — single batched path, one fill call
  ctx2d.fillStyle = '#fff';
  ctx2d.beginPath();
  for (const seg of SC) {
    const a = angle + seg.s, px = cx + r * Math.cos(a), py = cx + r * Math.sin(a);
    ctx2d.moveTo(px + 3.5, py);
    ctx2d.arc(px, py, 3.5, 0, Math.PI * 2);
  }
  ctx2d.fill();
}

function spin() {
  if (busy) return;
  busy = true;

  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Պտտվում…';

  // Always land on the small black winner segment
  const win = SC[WINNER_IDX];
  const winMid = win.s + win.arc / 2;

  // Pointer is at top = canvas angle -π/2
  // Want: angle + winMid ≡ -π/2  (mod 2π)
  // → targetAngle = -π/2 - winMid + 2π*k
  const base = -Math.PI / 2 - winMid;
  const minSpin = angle + 6 * Math.PI * 2;
  const k = Math.ceil((minSpin - base) / (Math.PI * 2));
  const targetAngle = base + (k + Math.floor(Math.random() * 5)) * Math.PI * 2;

  const total = targetAngle - angle;
  const start = angle, dur = 5200, t0 = performance.now();

  function frame(now) {
    const p = Math.min((now - t0) / dur, 1);
    angle = start + total * (1 - Math.pow(1 - p, 4));
    drawWheel();

    if (p < 1) { requestAnimationFrame(frame); return; }

    angle = ((targetAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    drawWheel();
    busy = false;
    setTimeout(showResult, 750);
  }

  requestAnimationFrame(frame);
}

// ── confetti ──────────────────────────────────────
function startConfetti() {
  const cv = document.getElementById('confetti');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const cx = cv.getContext('2d');
  const palette = ['#ff6eb4','#b24bff','#ffd700','#ff4500','#00ced1','#ff1493','#adff2f','#fff'];

  const bits = Array.from({ length: 120 }, () => ({
    x:   Math.random() * cv.width,
    y:  -16 - Math.random() * cv.height * .6,
    vx:  (Math.random() - .5) * 5.5,
    vy:  1.5 + Math.random() * 4.5,
    r:   4 + Math.random() * 8,
    rot: Math.random() * Math.PI * 2,
    rv:  (Math.random() - .5) * .22,
    col: palette[Math.floor(Math.random() * palette.length)],
    sq:  Math.random() > .45,
  }));

  function tick() {
    cx.clearRect(0, 0, cv.width, cv.height);
    let live = false;
    bits.forEach(b => {
      if (b.y > cv.height + 20) return;
      live = true;
      b.x += b.vx; b.y += b.vy; b.vy += .065; b.rot += b.rv;
      cx.save();
      cx.translate(b.x, b.y); cx.rotate(b.rot);
      cx.globalAlpha = Math.max(0, 1 - b.y / cv.height * .75);
      cx.fillStyle = b.col;
      if (b.sq) cx.fillRect(-b.r, -b.r / 2, b.r * 2, b.r);
      else { cx.beginPath(); cx.arc(0, 0, b.r / 2, 0, Math.PI * 2); cx.fill(); }
      cx.restore();
    });
    if (live) requestAnimationFrame(tick);
    else cx.clearRect(0, 0, cv.width, cv.height);
  }

  requestAnimationFrame(tick);
}

// ── ticket slider ─────────────────────────────────
const SLIDE_COUNT = 2;
let slideIdx = 0;
const track   = document.getElementById('ticket-track');
const sliderEl= document.getElementById('ticket-slider');
const dots    = document.querySelectorAll('.slider-dot');

function goSlide(i, animate = true) {
  slideIdx = Math.max(0, Math.min(SLIDE_COUNT - 1, i));
  track.style.transition = animate ? 'transform .35s cubic-bezier(.4,0,.2,1)' : 'none';
  track.style.transform  = `translateX(-${slideIdx * 100}%)`;
  dots.forEach((d, j) => d.classList.toggle('active', j === slideIdx));
}

let dragX0 = 0, dragT0 = 0, dragging = false;

function dragStart(x) {
  dragX0 = x; dragT0 = Date.now(); dragging = true;
  track.style.transition = 'none';
}
function dragMove(x) {
  if (!dragging) return;
  let dx = x - dragX0;
  // rubber-band resistance at edges
  if ((slideIdx === 0 && dx > 0) || (slideIdx === SLIDE_COUNT - 1 && dx < 0)) dx *= 0.2;
  track.style.transform = `translateX(calc(-${slideIdx * 100}% + ${dx}px))`;
}
function dragEnd(x) {
  if (!dragging) return;
  dragging = false;
  const dx = x - dragX0;
  const v  = dx / Math.max(1, Date.now() - dragT0); // px/ms
  if      (v < -0.25 || dx < -50) goSlide(slideIdx + 1);
  else if (v >  0.25 || dx >  50) goSlide(slideIdx - 1);
  else                              goSlide(slideIdx);       // snap back
}

track.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), { passive: true });
track.addEventListener('touchmove',  e => dragMove(e.touches[0].clientX),  { passive: true });
track.addEventListener('touchend',   e => dragEnd(e.changedTouches[0].clientX));
</script>
</body>
</html>
